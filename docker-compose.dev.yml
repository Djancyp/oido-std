services:
  proxy:
    image: traefik:v3.6.5
    container_name: ${PROJECT_NAME:-oido}-proxy
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${TRAEFIK_DASHBOARD_PORT:-8080}:8080'
    command:
      - '--api.insecure=true'
      - '--api.dashboard=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - project_proxy

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        OIDO_BINARY: ./oido
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: oido-std:latest
    env_file:
      - .env
    container_name: oido-std
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - AGENT_WORKDIR=/home/node
      - NEXT_PUBLIC_APP_URL=http://oido.localhost
    volumes:
      - ./data:/app/data
      - /home/djan/Documents/codding/agent-cli/oido-cli/oido:/usr/local/bin/oido
      - /home/djan/.config/oido:/root/.config/oido:rw
      - /home/djan/.cache/oido:/root/.cache/oido:rw
      - /home/djan/.local/share/oido:/root/.local/share/oido:rw
      - /home/djan/.ssh:/root/.ssh:ro
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.oido.rule=Host(`oido.localhost`)'
      - 'traefik.http.routers.oido.entrypoints=web'
      - 'traefik.http.services.oido.loadbalancer.server.port=3000'
    networks:
      - project_proxy

  n8n:
    image: n8nio/n8n
    environment:
      - DB_TYPE=sqlite
      - DB_SQLITE_POOL_SIZE=2
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - WEBHOOK_TUNNEL_URL=http://n8n.localhost/
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_PATH_PREFIX=/
      - N8N_RUNNERS_ENABLED=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    command: 'start --tunnel'
    ports:
      - 5678:5678
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.n8n.rule=Host(`n8n.localhost`)'
      - 'traefik.http.routers.n8n.entrypoints=web'
      - 'traefik.http.services.n8n.loadbalancer.server.port=5678'
    networks:
      - project_proxy

networks:
  project_proxy:
    driver: bridge
