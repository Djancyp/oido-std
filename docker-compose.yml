services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OIDO_BINARY: ./oido
    image: oido-std:latest
    container_name: oido-std
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/prod.db}
      OIDO_PATH: ${OIDO_PATH:-oido}
      INTERNAL_BASE_URL: http://localhost:3000
    volumes:
      - app-data:/app/data
      - /usr/local/bin/oido:/usr/local/bin/oido
      - /home/djan/.config/oido:/home/node/.config/oido:rw
      - /home/djan/.cache/oido:/home/node/.cache/oido:rw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oido.rule=Host(`oido.bruna-tech.com`)"
      - "traefik.http.routers.oido.entrypoints=websecure"
      - "traefik.http.routers.oido.tls.certResolver=myresolver"
      - "traefik.http.services.oido.loadbalancer.server.port=3000"
      - "traefik.http.routers.oido.priority=1"
    networks:
      - traefik_proxy

networks:
  traefik_proxy:
    external: true

volumes:
  app-data:
  oido-config:
  oido-cache:
